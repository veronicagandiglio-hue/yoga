<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caricamento…</title>
  <meta name="description" content="" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="" />
  <meta property="og:description" content="" />
  <meta property="og:image" content="" />
  <meta property="og:url" content="" />

  <!-- Schema.org JSON-LD -->
  <script type="application/ld+json" id="schema-ld"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet"
  />

  <style>
    /* ─────────────────────────────────────────
       CSS CUSTOM PROPERTIES — DESIGN TOKENS
    ───────────────────────────────────────── */
    :root {
      /* Palette (sovrascritta da JS) */
      --color-bg-primary:    #F7F3EE;
      --color-bg-warm:       #EDE5DC;
      --color-bg-dark:       #1C1A18;
      --color-accent:        #B07B6A;
      --color-accent-hover:  #8F6155;
      --color-text-primary:  #1C1A18;
      --color-text-muted:    #8A7A72;
      --color-surface-pink:  #EDD5CC;
      --color-border:        rgba(176,123,106,0.2);
      --color-gradient-hero: radial-gradient(ellipse at 60% 0%, #D4A99A 0%, #E8C9B8 35%, #F7F3EE 100%);

      /* Font (sovrascritta da JS) */
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'Inter', system-ui, sans-serif;

      /* Spacing */
      --pad-x:        clamp(24px, 7vw, 96px);
      --pad-section:  clamp(72px, 10vh, 140px);
      --gap-col:      clamp(32px, 5vw, 80px);

      /* Navbar */
      --nav-h:        64px;
      --barra-h:      0px;

      /* Misc */
      --radius-pill:  999px;
      --transition:   0.3s ease;
    }

    /* ─────────────────────────────────────────
       RESET
    ───────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: var(--font-body);
      font-weight: 300;
      color: var(--color-text-primary);
      background: var(--color-bg-primary);
      line-height: 1.7;
      overflow-x: hidden;
      cursor: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
    }

    ul, ol { list-style: none; }

    /* ─────────────────────────────────────────
       TYPOGRAPHY SCALE
    ───────────────────────────────────────── */
    .t-display {
      font-family: var(--font-display);
      font-weight: 300;
      line-height: 0.95;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      hyphens: none;
    }

    .t-heading {
      font-family: var(--font-display);
      font-weight: 300;
      line-height: 1.05;
      hyphens: none;
    }

    .t-label {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-text-muted);
    }

    .t-body {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: clamp(14px, 1.1vw, 16px);
      line-height: 1.75;
      color: var(--color-text-muted);
    }

    .t-quote {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 300;
      line-height: 1.55;
    }

    /* ─────────────────────────────────────────
       LAYOUT UTILITIES
    ───────────────────────────────────────── */
    .container {
      width: 100%;
      padding-left: var(--pad-x);
      padding-right: var(--pad-x);
    }

    .section-pad {
      padding-top: var(--pad-section);
      padding-bottom: var(--pad-section);
    }

    /* Protect flex/grid children from overflow */
    .min-w-0 { min-width: 0; }

    /* Aspect-ratio wrappers */
    .ar-2-3  { aspect-ratio: 2/3; }
    .ar-3-4  { aspect-ratio: 3/4; }
    .ar-4-3  { aspect-ratio: 4/3; }
    .ar-1-1  { aspect-ratio: 1/1; }
    .ar-16-9 { aspect-ratio: 16/9; }

    .img-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* Pill button */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 24px;
      border: 1px solid var(--color-accent);
      border-radius: var(--radius-pill);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-primary);
      background: transparent;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .pill:hover {
      background: var(--color-accent);
      color: #fff;
    }

    .pill--filled {
      background: var(--color-accent);
      color: #fff;
    }

    .pill--filled:hover {
      background: var(--color-accent-hover);
      border-color: var(--color-accent-hover);
    }

    .pill--dark {
      background: var(--color-bg-dark);
      color: var(--color-bg-primary);
      border-color: var(--color-bg-dark);
    }

    .pill--dark:hover {
      background: var(--color-accent);
      border-color: var(--color-accent);
    }

    /* CTA text link */
    .cta-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-accent);
    }

    .cta-link .arrow {
      display: inline-block;
      transition: transform 0.2s ease;
    }

    .cta-link:hover .arrow { transform: translateX(6px); }

    /* Reveal base (JS aggiunge .is-visible) */
    [data-reveal] {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s cubic-bezier(0.22,1,0.36,1),
                  transform 0.7s cubic-bezier(0.22,1,0.36,1);
    }

    [data-reveal].is-visible {
      opacity: 1;
      transform: none;
    }

    [data-reveal][data-delay="1"] { transition-delay: 0.08s; }
    [data-reveal][data-delay="2"] { transition-delay: 0.16s; }
    [data-reveal][data-delay="3"] { transition-delay: 0.24s; }
    [data-reveal][data-delay="4"] { transition-delay: 0.32s; }
    [data-reveal][data-delay="5"] { transition-delay: 0.40s; }
    [data-reveal][data-delay="6"] { transition-delay: 0.48s; }

    /* Clip reveal */
    [data-reveal-clip] {
      clip-path: inset(0 100% 0 0);
      opacity: 1;
      transform: none;
      transition: clip-path 0.9s cubic-bezier(0.22,1,0.36,1);
    }

    [data-reveal-clip].is-visible {
      clip-path: inset(0 0% 0 0);
    }

    /* Visually hidden */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
    }

    /* ─────────────────────────────────────────
       WATERMARK (admin-only)
    ───────────────────────────────────────── */
    #watermark {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99990;
      pointer-events: none;
      background: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 80px,
        rgba(0,0,0,0.04) 80px,
        rgba(0,0,0,0.04) 82px
      );
    }

    #watermark::after {
      content: 'SITO DI PROVA — OMPAGE';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%) rotate(-35deg);
      font-family: sans-serif;
      font-size: clamp(18px, 3vw, 32px);
      font-weight: 700;
      letter-spacing: 0.2em;
      color: rgba(0,0,0,0.08);
      white-space: nowrap;
      pointer-events: none;
    }

    /* ─────────────────────────────────────────
       CURSOR CUSTOM (GLOB-01)
    ───────────────────────────────────────── */
    #cursor-dot {
      position: fixed;
      width: 12px;
      height: 12px;
      border: 1px solid var(--color-accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 99999;
      transform: translate(-50%, -50%);
      transition: width 0.2s ease, height 0.2s ease, opacity 0.3s ease;
      will-change: left, top;
      opacity: 0;
    }

    #cursor-dot.cursor-expanded {
      width: 28px;
      height: 28px;
    }

    body.no-touch #cursor-dot { opacity: 1; }

    /* ─────────────────────────────────────────
       BARRA PROMOZIONI
    ───────────────────────────────────────── */
    #barra-promo {
      position: sticky;
      top: 0;
      z-index: 99;
      height: 0;
      overflow: hidden;
      background: var(--color-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 0 var(--pad-x);
      transform: translateY(-100%);
      transition: transform 0.5s cubic-bezier(0.22,1,0.36,1), height 0.3s ease;
    }

    #barra-promo.visible {
      height: 36px;
      transform: translateY(0);
    }

    #barra-promo .promo-text {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 70%;
    }

    #barra-promo .promo-cta {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: underline;
      text-underline-offset: 3px;
      white-space: nowrap;
    }

    #barra-promo .promo-close {
      position: absolute;
      right: 16px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
      opacity: 0.7;
      transition: opacity 0.2s, transform 0.3s;
    }

    #barra-promo .promo-close:hover {
      opacity: 1;
      transform: rotate(90deg);
    }

    /* ─────────────────────────────────────────
       NAVBAR
    ───────────────────────────────────────── */
    #main-nav {
      position: fixed;
      top: var(--barra-h);
      left: 0;
      right: 0;
      height: var(--nav-h);
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 var(--pad-x);
      transition: background 0.4s ease, backdrop-filter 0.4s ease, border-color 0.4s ease;
      border-bottom: 1px solid transparent;
    }

    #main-nav.scrolled {
      background: rgba(247,243,238,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom-color: var(--color-border);
    }

    .nav-left {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .nav-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .nav-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .nav-logo-text {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 20px;
      letter-spacing: 0.02em;
      color: var(--color-text-primary);
      line-height: 1;
    }

    .nav-logo-img-wrap {
      aspect-ratio: 3/1;
      max-width: 120px;
      overflow: hidden;
    }

    .nav-logo-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .nav-link {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--color-text-primary);
      position: relative;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--color-accent);
      transition: width 0.2s ease;
    }

    .nav-link:hover::after { width: 100%; }

    /* Hamburger mobile */
    #nav-hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      width: 28px;
      cursor: pointer;
    }

    #nav-hamburger span {
      display: block;
      height: 1px;
      background: var(--color-text-primary);
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    #nav-hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    #nav-hamburger.open span:nth-child(2) { opacity: 0; }
    #nav-hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    /* Menu mobile overlay */
    #mobile-menu {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 98;
      background: var(--color-bg-primary);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: var(--pad-x);
    }

    #mobile-menu.open { display: flex; }

    #mobile-menu a {
      font-family: var(--font-display);
      font-size: clamp(28px, 7vw, 48px);
      font-weight: 300;
      text-transform: uppercase;
      color: var(--color-text-primary);
      letter-spacing: 0.02em;
    }

    @media (max-width: 768px) {
      .nav-left .nav-link { display: none; }
      #nav-hamburger { display: flex; }
      .nav-right .pill { display: none; }
    }

    /* ─────────────────────────────────────────
       POPUP EMERGENZA
    ───────────────────────────────────────── */
    #popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(28,26,24,0.72);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #popup-overlay.visible { display: flex; }

    #popup-panel {
      background: var(--color-bg-primary);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      padding: clamp(32px, 5vw, 56px);
      max-width: 480px;
      width: 100%;
      position: relative;
      transform: scale(0.94);
      opacity: 0;
      transition: transform 0.4s cubic-bezier(0.22,1,0.36,1),
                  opacity 0.4s cubic-bezier(0.22,1,0.36,1);
    }

    #popup-overlay.visible #popup-panel {
      transform: scale(1);
      opacity: 1;
    }

    #popup-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    #popup-close:hover { opacity: 1; }

    #popup-close svg {
      width: 16px;
      height: 16px;
      stroke: var(--color-text-primary);
    }

    .popup-title {
      font-family: var(--font-display);
      font-size: clamp(22px, 3vw, 34px);
      font-weight: 300;
      margin-bottom: 16px;
      hyphens: none;
    }

    .popup-body {
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 300;
      line-height: 1.7;
      color: var(--color-text-muted);
      margin-bottom: 28px;
    }

    /* ─────────────────────────────────────────
       HERO
    ───────────────────────────────────────── */
    #hero {
      min-height: 100svh;
      background: var(--color-gradient-hero);
      display: grid;
      grid-template-rows: 1fr auto;
      padding-top: calc(var(--nav-h) + var(--barra-h) + 4vh);
      padding-bottom: clamp(48px, 8vh, 96px);
      padding-left: var(--pad-x);
      padding-right: var(--pad-x);
      position: relative;
      overflow: hidden;
      animation: ambientShift 20s ease-in-out infinite alternate;
    }

    @keyframes ambientShift {
      0%   { background-position: 60% 0%; }
      100% { background-position: 40% 0%; }
    }

    .hero-tripartite {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: clamp(16px, 3vw, 48px);
      align-items: start;
    }

    .hero-title-left {
      font-family: var(--font-display);
      font-size: clamp(48px, 8.5vw, 128px);
      font-weight: 300;
      text-transform: uppercase;
      line-height: 0.92;
      letter-spacing: -0.01em;
      align-self: start;
      padding-top: 6vh;
      hyphens: none;
    }

    .hero-title-right {
      font-family: var(--font-display);
      font-size: clamp(48px, 8.5vw, 128px);
      font-weight: 300;
      text-transform: uppercase;
      line-height: 0.92;
      letter-spacing: -0.01em;
      text-align: right;
      align-self: start;
      padding-top: 14vh;
      hyphens: none;
    }

    .hero-photo-col {
      width: clamp(160px, 20vw, 300px);
      margin-top: -20px;
      position: relative;
      z-index: 2;
    }

    .hero-photo-wrap {
      aspect-ratio: 2/3;
      overflow: hidden;
      width: 100%;
    }

    .hero-photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      will-change: transform;
    }

    .hero-bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-top: clamp(32px, 5vh, 64px);
    }

    .hero-subtitle {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: clamp(14px, 1.1vw, 16px);
      color: var(--color-text-muted);
      max-width: 280px;
      line-height: 1.75;
    }

    /* Initial state for JS animation */
    .hero-photo-wrap,
    .hero-title-left,
    .hero-title-right,
    .hero-subtitle,
    .hero-bottom .cta-link {
      opacity: 0;
    }

    @media (max-width: 768px) {
      #hero {
        grid-template-rows: auto auto;
        padding-top: calc(var(--nav-h) + var(--barra-h) + 32px);
      }

      .hero-tripartite {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        justify-items: center;
        gap: 24px;
      }

      .hero-title-left {
        order: 2;
        padding-top: 0;
        text-align: center;
        font-size: clamp(40px, 11vw, 64px);
      }

      .hero-photo-col {
        order: 1;
        width: 60vw;
        max-width: 260px;
        margin-top: 0;
      }

      .hero-title-right {
        order: 3;
        padding-top: 0;
        text-align: center;
        font-size: clamp(40px, 11vw, 64px);
      }

      .hero-bottom {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .hero-subtitle { max-width: 100%; }
    }

    /* ─────────────────────────────────────────
       CHI SONO
    ───────────────────────────────────────── */
    #chi-siamo {
      background: var(--color-bg-primary);
      padding-top: var(--pad-section);
      padding-bottom: var(--pad-section);
      padding-left: var(--pad-x);
      padding-right: var(--pad-x);
    }

    .chi-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: var(--gap-col);
      align-items: start;
    }

    .chi-left { min-width: 0; }

    .chi-title-wrap {
      margin-bottom: clamp(32px, 4vh, 56px);
      overflow: hidden;
    }

    .chi-title-line {
      display: block;
      font-family: var(--font-display);
      font-size: clamp(38px, 6.5vw, 100px);
      font-weight: 300;
      text-transform: uppercase;
      line-height: 0.95;
      letter-spacing: -0.01em;
    }

    .chi-title-line-2 {
      padding-left: clamp(40px, 14%, 150px);
    }

    .chi-body-text {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: clamp(14px, 1.1vw, 16px);
      line-height: 1.8;
      color: var(--color-text-muted);
      max-width: 44ch;
    }

    .chi-right { min-width: 0; }

    .chi-photo-wrap {
      aspect-ratio: 3/4;
      overflow: hidden;
      width: 100%;
      margin-top: -80px;
    }

    .chi-photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      transition: transform 0.6s cubic-bezier(0.22,1,0.36,1);
    }

    .chi-photo-wrap:hover img { transform: scale(1.03); }

    .chi-quote-block {
      margin-top: 32px;
      padding-top: 24px;
      position: relative;
    }

    .chi-quote-block::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--color-accent);
      transition: width 0.4s ease 0.8s;
    }

    .chi-quote-block.line-visible::before { width: 40px; }

    .chi-quote-text {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 300;
      font-size: clamp(15px, 1.4vw, 19px);
      line-height: 1.6;
      color: var(--color-text-muted);
    }

    .chi-name {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-top: 14px;
    }

    .chi-ruolo {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 300;
      color: var(--color-text-muted);
      letter-spacing: 0.04em;
      margin-top: 3px;
    }

    @media (max-width: 768px) {
      .chi-grid {
        grid-template-columns: 1fr;
      }

      .chi-photo-wrap {
        margin-top: 0;
        width: 60vw;
        max-width: 260px;
      }

      .chi-right { order: -1; }

      .chi-title-line-2 {
        padding-left: clamp(24px, 8%, 60px);
      }
    }

    /* ─────────────────────────────────────────
       SERVIZI
    ───────────────────────────────────────── */
    #servizi {
      background: var(--color-bg-warm);
      padding-top: var(--pad-section);
      padding-bottom: var(--pad-section);
      padding-left: var(--pad-x);
      padding-right: var(--pad-x);
    }

    .servizi-grid {
      display: grid;
      grid-template-columns: 0.45fr 0.55fr;
      gap: var(--gap-col);
      align-items: start;
    }

    .servizi-left { min-width: 0; }

    .servizi-section-title {
      font-family: var(--font-display);
      font-size: clamp(38px, 6vw, 88px);
      font-weight: 300;
      text-transform: uppercase;
      line-height: 0.95;
      letter-spacing: -0.01em;
      margin-bottom: clamp(24px, 3vh, 40px);
    }

    .servizi-foto-wrap {
      aspect-ratio: 3/4;
      overflow: visible; /* foto sfonda verso il basso */
      width: 100%;
      margin-bottom: -80px;
      position: relative;
      z-index: 2;
    }

    .servizi-foto-inner {
      aspect-ratio: 3/4;
      overflow: hidden;
      width: 100%;
    }

    .servizi-foto-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .servizi-right { min-width: 0; }

    .servizi-lista { width: 100%; }

    .servizio-item {
      border-top: 1px solid var(--color-border);
      padding: 26px 0;
      position: relative;
      transition: background 0.2s ease, padding-left 0.2s ease;
    }

    .servizio-item:hover {
      background: rgba(176,123,106,0.04);
      padding-left: 8px;
    }

    .servizio-item:last-child { border-bottom: 1px solid var(--color-border); }

    .servizio-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 6px;
    }

    .servizio-nome {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-text-primary);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .servizio-numero {
      font-size: 0.6em;
      vertical-align: super;
      color: var(--color-accent);
      margin-left: 3px;
      font-weight: 400;
    }

    .servizio-prezzo {
      font-family: var(--font-display);
      font-size: clamp(14px, 1.2vw, 17px);
      font-weight: 300;
      color: var(--color-accent);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .servizio-desc {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 300;
      line-height: 1.7;
      color: var(--color-text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Line draw animation state */
    .servizio-item .line-draw {
      position: absolute;
      top: -1px;
      left: 0;
      height: 1px;
      width: 0;
      background: var(--color-accent);
      transition: width 0.4s ease;
    }

    .servizio-item.drawn .line-draw { width: 100%; }

    .pdf-cta-wrap {
      margin-top: 40px;
    }

    @media (max-width: 768px) {
      .servizi-grid {
        grid-template-columns: 1fr;
      }

      .servizi-foto-wrap {
        width: 70vw;
        max-width: 280px;
        margin-bottom: 32px;
      }

      .servizio-desc { -webkit-line-clamp: 4; }
    }

    /* ─────────────────────────────────────────
       GALLERIA STANDARD — BENTO
    ───────────────────────────────────────── */
    #galleria {
      background: var(--color-bg-primary);
      padding-top: var(--pad-section);
      padding-bottom: var(--pad-section);
    }

    .galleria-header {
      padding-left: var(--pad-x);
      padding-right: var(--pad-x);
      margin-bottom: clamp(32px, 4vh, 56px);
    }

    .galleria-section-title {
      font-family: var(--font-display);
      font-size: clamp(36px, 5.5vw, 80px);
      font-weight: 300;
      text-transform: uppercase;
      line-height: 0.95;
    }

    .bento-grid {
      display: grid;
      gap: 6px;
      /* Padding left zero — la cella 1 sfonda fino al bordo sinistro */
      padding-left: 0;
      padding-right: var(--pad-x);
      /* Margin negativo a sinistra per il full-bleed */
      margin-left: 0;
    }

    .gallery-cell {
      overflow: hidden;
      position: relative;
      cursor: none;
    }

    .gallery-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s cubic-bezier(0.22,1,0.36,1);
    }

    .gallery-cell:hover img { transform: scale(1.06); }

    /* Clip reveal base */
    .gallery-cell {
      clip-path: inset(100% 0 0 0);
      transition: clip-path 0.7s cubic-bezier(0.22,1,0.36,1);
    }

    .gallery-cell.revealed { clip-path: inset(0% 0 0 0); }

    /* ── BENTO LAYOUTS ── */

    /* BENTO-4 */
    .bento-4 {
      grid-template-columns: 2fr 1fr 1fr;
      grid-template-rows: auto auto;
    }
    .bento-4 .foto-1 { grid-column: 1; grid-row: 1 / 3; aspect-ratio: 3/4; }
    .bento-4 .foto-2 { grid-column: 2; grid-row: 1; aspect-ratio: 4/3; }
    .bento-4 .foto-3 { grid-column: 3; grid-row: 1; aspect-ratio: 4/3; }
    .bento-4 .foto-4 { grid-column: 2 / 4; grid-row: 2; aspect-ratio: 16/9; }

    /* BENTO-5 */
    .bento-5 {
      grid-template-columns: 2fr 1fr 1fr;
      grid-template-rows: auto auto;
    }
    .bento-5 .foto-1 { grid-column: 1; grid-row: 1 / 3; aspect-ratio: 3/4; }
    .bento-5 .foto-2 { grid-column: 2; grid-row: 1; aspect-ratio: 4/3; }
    .bento-5 .foto-3 { grid-column: 3; grid-row: 1; aspect-ratio: 4/3; }
    .bento-5 .foto-4 { grid-column: 2; grid-row: 2; aspect-ratio: 1/1; }
    .bento-5 .foto-5 { grid-column: 3; grid-row: 2; aspect-ratio: 1/1; }

    /* BENTO-6 */
    .bento-6 {
      grid-template-columns: 1fr 2fr 1fr;
      grid-template-rows: auto auto;
    }
    .bento-6 .foto-1 { grid-column: 1; grid-row: 1; aspect-ratio: 3/4; }
    .bento-6 .foto-2 { grid-column: 2; grid-row: 1 / 3; aspect-ratio: 2/3; }
    .bento-6 .foto-3 { grid-column: 3; grid-row: 1; aspect-ratio: 3/4; }
    .bento-6 .foto-4 { grid-column: 1; grid-row: 2; aspect-ratio: 1/1; }
    .bento-6 .foto-5 { grid-column: 3; grid-row: 2; aspect-ratio: 1/1; }
    .bento-6 .foto-6 { grid-column: 1 / 4; grid-row: 3; aspect-ratio: 21/6; }

    /* BENTO-7 */
    .bento-7 {
      grid-template-columns: 1fr 1fr 2fr;
      grid-template-rows: auto auto auto;
    }
    .bento-7 .foto-1 { grid-column: 1 / 3; grid-row: 1; aspect-ratio: 16/9; }
    .bento-7 .foto-2 { grid-column: 3; grid-row: 1 / 3; aspect-ratio: 3/4; }
    .bento-7 .foto-3 { grid-column: 1; grid-row: 2; aspect-ratio: 1/1; }
    .bento-7 .foto-4 { grid-column: 2; grid-row: 2; aspect-ratio: 1/1; }
    .bento-7 .foto-5 { grid-column: 1; grid-row: 3; aspect-ratio: 4/3; }
    .bento-7 .foto-6 { grid-column: 2; grid-row: 3; aspect-ratio: 4/3; }
    .bento-7 .foto-7 { grid-column: 3; grid-row: 3; aspect-ratio: 4/3; }

    /* BENTO-8 */
    .bento-8 {
      grid-template-columns: 2fr 1fr 1fr;
      grid-template-rows: auto auto auto;
    }
    .bento-8 .foto-1 { grid-column: 1; grid-row: 1 / 3; aspect-ratio: 3/4; }
    .bento-8 .foto-2 { grid-column: 2; grid-row: 1; aspect-ratio: 4/3; }
    .bento-8 .foto-3 { grid-column: 3; grid-row: 1; aspect-ratio: 4/3; }
    .bento-8 .foto-4 { grid-column: 2 / 4; grid-row: 2; aspect-ratio: 16/9; }
    .bento-8 .foto-5 { grid-column: 1; grid-row: 3; aspect-ratio: 4/3; }
    .bento-8 .foto-6 { grid-column: 2; grid-row: 3; aspect-ratio: 4/3; }
    .bento-8 .foto-7 { grid-column: 3; grid-row: 3; aspect-ratio: 4/3; }
    .bento-8 .foto-8 { grid-column: 1 / 4; grid-row: 4; aspect-ratio: 21/6; }

    /* BENTO-9 */
    .bento-9 {
      grid-template-columns: 1fr 2fr 1fr;
      grid-template-rows: 1fr 2fr 1fr;
    }
    .bento-9 .foto-1 { grid-column: 1; grid-row: 1; aspect-ratio: 4/3; }
    .bento-9 .foto-2 { grid-column: 2; grid-row: 1; aspect-ratio: 4/3; }
    .bento-9 .foto-3 { grid-column: 3; grid-row: 1; aspect-ratio: 4/3; }
    .bento-9 .foto-4 { grid-column: 1; grid-row: 2; aspect-ratio: 3/4; }
    .bento-9 .foto-5 { grid-column: 2; grid-row: 2; aspect-ratio: 1/1; }
    .bento-9 .foto-6 { grid-column: 3; grid-row: 2; aspect-ratio: 3/4; }
    .bento-9 .foto-7 { grid-column: 1; grid-row: 3; aspect-ratio: 4/3; }
    .bento-9 .foto-8 { grid-column: 2; grid-row: 3; aspect-ratio: 4/3; }
    .bento-9 .foto-9 { grid-column: 3; grid-row: 3; aspect-ratio: 4/3; }

    /* Mobile bento → 2 colonne uniforme */
    @media (max-width: 768px) {
      .bento-grid {
        grid-template-columns: 1fr 1fr !important;
        grid-template-rows: auto !important;
        padding-left: var(--pad-x);
      }

      .bento-grid .gallery-cell {
        grid-column: auto !important;
        grid-row: auto !important;
        aspect-ratio: 1/1 !important;
      }
    }

    .galleria-footer {
      padding-left: var(--pad-x);
      padding-right: var(--pad-x);
      margin-top: clamp(24px, 3vh, 40px);
    }

    /* ─────────────────────────────────────────
       GALLERIA ESTESA — OVERLAY
    ───────────────────────────────────────── */
    #galleria-estesa-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      background: var(--color-bg-dark);
      flex-direction: column;
    }

    #galleria-estesa-overlay.open { display: flex; }

    .ge-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      flex-shrink: 0;
    }

    .ge-counter {
      font-family: var(--font-body);
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--color-text-muted);
    }

    .ge-close {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-bg-primary);
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .ge-close:hover { opacity: 1; }

    .ge-close svg { width: 20px; height: 20px; stroke: currentColor; }

    .ge-body {
      display: grid;
      grid-template-columns: 1fr 160px;
      gap: 16px;
      flex: 1;
      overflow: hidden;
      padding: 0 32px 24px;
    }

    .ge-main {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .ge-main-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    .ge-main-img.fading { opacity: 0; }

    .ge-thumbs {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .ge-thumbs::-webkit-scrollbar { display: none; }

    .ge-thumb {
      width: 100%;
      aspect-ratio: 1/1;
      overflow: hidden;
      cursor: pointer;
      flex-shrink: 0;
      border: 2px solid transparent;
      transition: border-color 0.2s, filter 0.2s;
      filter: grayscale(60%);
    }

    .ge-thumb.active {
      border-color: var(--color-accent);
      filter: none;
    }

    .ge-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .ge-arrows {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .ge-arrow {
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.2s;
      padding: 8px 0;
    }

    .ge-arrow:hover { color: var(--color-bg-primary); }

    @media (max-width: 768px) {
      .ge-body {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr auto;
        padding: 0 16px 16px;
      }

      .ge-thumbs {
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
        height: 72px;
      }

      .ge-thumb { width: 72px; flex-shrink: 0; }
    }

    /* ─────────────────────────────────────────
       RECENSIONI
    ───────────────────────────────────────── */
    #recensioni {
      background: var(--color-bg-warm);
      padding-top: var(--pad-section);
      padding-bottom: var(--pad-section);
      padding-left: var(--pad-x);
      padding-right: var(--pad-x);
      position: relative;
      overflow: hidden;
    }

    .rec-quote-mark {
      position: absolute;
      top: clamp(60px, 8vh, 100px);
      left: var(--pad-x);
      font-family: var(--font-display);
      font-size: clamp(100px, 14vw, 180px);
      line-height: 1;
      color: var(--color-accent);
      opacity: 0.09;
      pointer-events: none;
      user-select: none;
    }

    .rec-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap-col);
      position: relative;
      z-index: 1;
    }

    .rec-left { min-width: 0; }

    .rec-section-title {
      font-family: var(--font-display);
      font-size: clamp(32px, 5vw, 72px);
      font-weight: 300;
      text-transform: uppercase;
      line-height: 0.95;
      margin-bottom: clamp(32px, 5vh, 56px);
    }

    .rec-text {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 300;
      font-size: clamp(17px, 1.8vw, 23px);
      line-height: 1.65;
      color: var(--color-text-primary);
      min-height: 6em;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .rec-text.fading {
      opacity: 0;
      transform: translateY(-12px);
    }

    .rec-author {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 32px;
      transition: opacity 0.25s ease 0.1s, transform 0.25s ease 0.1s;
    }

    .rec-author.fading {
      opacity: 0;
      transform: translateY(-8px);
    }

    .rec-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--color-bg-primary);
      color: var(--color-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 400;
      flex-shrink: 0;
      transition: transform 0.4s ease;
    }

    .rec-author:hover .rec-avatar { transform: rotate(-3deg); }

    .rec-author-name {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-primary);
    }

    .rec-stars {
      font-size: 12px;
      color: var(--color-accent);
      margin-top: 2px;
    }

    .rec-right { min-width: 0; align-self: end; }

    .rec-cta-google {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      text-decoration: underline;
      text-underline-offset: 4px;
      transition: color 0.2s;
    }

    .rec-cta-google:hover { color: var(--color-accent); }

    .rec-nav {
      display: flex;
      gap: 20px;
      margin-top: 24px;
    }

    .rec-nav-btn {
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      position: relative;
      transition: color 0.2s;
    }

    .rec-nav-btn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--color-accent);
      transition: width 0.2s;
    }

    .rec-nav-btn:hover { color: var(--color-accent); }
    .rec-nav-btn:hover::after { width: 100%; }

    @media (max-width: 768px) {
      .rec-grid { grid-template-columns: 1fr; }
      .rec-right { margin-top: 32px; }
      .rec-text { min-height: auto; }
    }

    /* ─────────────────────────────────────────
       FAQ
    ───────────────────────────────────────── */
    #faq {
      background: var(--color-bg-primary);
      padding-top: var(--pad-section);
      padding-bottom: var(--pad-section);
      padding-left: var(--pad-x);
      padding-right: var(--pad-x);
    }

    .faq-grid {
      display: grid;
      grid-template-columns: 0.45fr 0.55fr;
      gap: var(--gap-col);
      align-items: start;
    }

    .faq-left {
      position: sticky;
      top: calc(var(--nav-h) + var(--barra-h) + 32px);
      min-width: 0;
    }

    .faq-section-title {
      font-family: var(--font-display);
      font-size: clamp(32px, 5vw, 72px);
      font-weight: 300;
      text-transform: uppercase;
      line-height: 0.95;
      margin-bottom: 16px;
    }

    .faq-intro {
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 300;
      line-height: 1.75;
      color: var(--color-text-muted);
      max-width: 32ch;
    }

    .faq-right { min-width: 0; }

    .faq-item { border-top: 1px solid var(--color-border); }
    .faq-item:last-child { border-bottom: 1px solid var(--color-border); }

    .faq-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 0;
      cursor: pointer;
      transition: background 0.2s;
    }

    .faq-header:hover { background: rgba(176,123,106,0.03); }

    .faq-question {
      font-family: var(--font-body);
      font-size: clamp(14px, 1.1vw, 16px);
      font-weight: 400;
      line-height: 1.4;
      color: var(--color-text-primary);
      min-width: 0;
      transition: color 0.3s;
    }

    .faq-item.open .faq-question { color: var(--color-accent); }

    .faq-icon {
      width: 16px;
      height: 16px;
      position: relative;
      flex-shrink: 0;
    }

    .faq-icon-h,
    .faq-icon-v {
      position: absolute;
      background: var(--color-accent);
    }

    .faq-icon-h {
      width: 100%;
      height: 1px;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
    }

    .faq-icon-v {
      width: 1px;
      height: 100%;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      transition: transform 0.3s ease;
    }

    .faq-item.open .faq-icon-v { transform: translateX(-50%) rotate(90deg); }

    /* ACCORDION: grid-template-rows, NEVER height:auto */
    .faq-body {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.4s cubic-bezier(0.22,1,0.36,1);
      overflow: hidden;
    }

    .faq-item.open .faq-body { grid-template-rows: 1fr; }

    .faq-body-inner { min-height: 0; }

    .faq-answer {
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 300;
      line-height: 1.75;
      color: var(--color-text-muted);
      padding-bottom: 22px;
    }

    @media (max-width: 768px) {
      .faq-grid { grid-template-columns: 1fr; }
      .faq-left { position: static; margin-bottom: 32px; }
      .faq-intro { max-width: 100%; }
    }

    /* ─────────────────────────────────────────
       FOOTER + CTA
    ───────────────────────────────────────── */
    #cta-contatti {
      background: var(--color-bg-primary);
      padding-top: var(--pad-section);
      padding-bottom: var(--pad-section);
      padding-left: var(--pad-x);
      padding-right: var(--pad-x);
    }

    .cta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap-col);
      align-items: start;
    }

    .cta-left { min-width: 0; }

    .cta-title {
      font-family: var(--font-display);
      font-size: clamp(40px, 7vw, 108px);
      font-weight: 300;
      text-transform: uppercase;
      line-height: 0.92;
      letter-spacing: -0.01em;
      margin-bottom: clamp(32px, 5vh, 56px);

  <script>
  'use strict';

  /* ─────────────────────────────────────────
     UTILITY
  ───────────────────────────────────────── */
  function isOn(val) {
    return val === 'SI';
  }

  function sanitizeUrl(val) {
    if (!val || val.trim() === '') return '';
    val = val.trim();
    if (!val.startsWith('http')) val = 'https://' + val;
    return val;
  }

  function sanitizeImgPath(val) {
    if (!val || val.trim() === '') return '';
    return val.trim();
  }

  function absoluteAssetUrl(val) {
    const clean = sanitizeImgPath(val);
    if (!clean) return '';
    try {
      return new URL(clean, window.location.href).href;
    } catch(e) {
      return clean;
    }
  }

  function sanitizeTel(val) {
    if (!val || val.trim() === '') return '';
    return val.trim().replace(/[^0-9+\s]/g, '');
  }

  function setText(id, txt) {
    const el = document.getElementById(id);
    if (el && txt) el.textContent = txt;
  }

  function hideEl(id) {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  }

  function showEl(id, display) {
    const el = document.getElementById(id);
    if (el) el.style.display = display || 'block';
  }

  function buildCtaHref(tipo, contatto) {
    const c = (contatto || '').trim();
    if (!c) return '';
    if (tipo === 'WHATSAPP') {
      const num = c.replace(/\D/g,'');
      return 'https://wa.me/' + num;
    }
    if (tipo === 'TELEFONO') return 'tel:' + c;
    if (tipo === 'EMAIL')    return 'mailto:' + c;
    if (tipo === 'URL')      return sanitizeUrl(c);
    return '';
  }

  function setHref(el, href) {
    if (el && href) el.href = href;
    else if (el) el.style.display = 'none';
  }

  function initials(name) {
    if (!name) return '?';
    return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
  }

  function starsHtml(n) {
    const count = parseInt(n) || 5;
    return '★'.repeat(Math.min(count,5));

    const ogUrl = document.querySelector('meta[property="og:url"]');
if (ogUrl) ogUrl.content = window.location.href;

    const telefono = cfg.footer_telefono  || cfg.footer_whatsapp || cfg.schema_telefono  || '';

      "address":    { "@type": "PostalAddress", "streetAddress": indirizzo },
      "telephone":  sanitizeTel(telefono),
      "openingHours": orari,
      "image":      absoluteAssetUrl(cfg.og_immagine),

  ───────────────────────────────────────── */
  function initMobileMenu() {
    const ham  = document.getElementById('nav-hamburger');
    const menu = document.getElementById('mobile-menu');
    if (!ham || !menu) return;

    ham.addEventListener('click', () => {
      const open = menu.classList.toggle('open');
      ham.classList.toggle('open', open);
      ham.setAttribute('aria-expanded', open);
      menu.setAttribute('aria-hidden', !open);
      document.body.style.overflow = open ? 'hidden' : '';
    });

    menu.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        menu.classList.remove('open');
        ham.classList.remove('open');
        ham.setAttribute('aria-expanded', false);
        menu.setAttribute('aria-hidden', true);
        document.body.style.overflow = '';
      });
    });
  }

     POPUP
  ───────────────────────────────────────── */
  function initPopup(cfg) {
    if (!isOn(cfg.popup_attivo) || !cfg.popup_testo) return;

    const overlay = document.getElementById('popup-overlay');
    const titleEl = document.getElementById('popup-title-el');
    const bodyEl  = document.getElementById('popup-body-el');
    const ctaEl   = document.getElementById('popup-cta-el');
    const closeBtn= document.getElementById('popup-close');
    if (!overlay) return;

    if (titleEl) titleEl.textContent = cfg.popup_testo.split('.')[0] || cfg.popup_testo;
    if (bodyEl)  bodyEl.textContent  = cfg.popup_testo;

    const href = buildCtaHref(cfg.popup_cta_tipo, cfg.popup_cta_contatto);
    if (ctaEl && cfg.popup_cta_testo && href) {
      ctaEl.textContent = cfg.popup_cta_testo;
      ctaEl.href = href;
      if (cfg.popup_cta_tipo === 'WHATSAPP') ctaEl.target = '_blank';
    } else if (ctaEl) {
      ctaEl.style.display = 'none';
    }

    const openPopup = () => {
      overlay.classList.add('visible');
      overlay.setAttribute('aria-hidden', false);
    };

    const closePopup = () => {
      overlay.classList.remove('visible');
      overlay.setAttribute('aria-hidden', true);
    };

    setTimeout(openPopup, 3000);

    closeBtn && closeBtn.addEventListener('click', closePopup);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closePopup();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closePopup();
    });
  }

  /* ─────────────────────────────────────────
     CURSOR CUSTOM (GLOB-01)
  ───────────────────────────────────────── */
  function initCursor() {
    const isTouch = window.matchMedia('(pointer: coarse)').matches;
    if (isTouch) return;

    document.body.classList.add('no-touch');
    const dot = document.getElementById('cursor-dot');
    if (!dot) return;

    let mx = 0, my = 0, cx = 0, cy = 0;

    document.addEventListener('mousemove', (e) => {
      mx = e.clientX;
      my = e.clientY;
    });

    const lerp = (a, b, t) => a + (b - a) * t;

    const tick = () => {
      cx = lerp(cx, mx, 0.12);
      cy = lerp(cy, my, 0.12);
      dot.style.left = cx + 'px';
      dot.style.top  = cy + 'px';
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);

    // Expand on gallery cells
    document.addEventListener('mouseover', (e) => {
      if (e.target.closest('.gallery-cell, .chi-photo-wrap, .servizi-foto-inner')) {
        dot.classList.add('cursor-expanded');
      }
    });
    document.addEventListener('mouseout', (e) => {
      if (e.target.closest('.gallery-cell, .chi-photo-wrap, .servizi-foto-inner')) {
        dot.classList.remove('cursor-expanded');
      }
    });
  }

  /* ─────────────────────────────────────────
     INTERSECTION OBSERVER — REVEAL GLOBALE
  ───────────────────────────────────────── */
  function initRevealObserver() {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

    document.querySelectorAll('[data-reveal], [data-reveal-clip]')
      .forEach(el => observer.observe(el));
  }

  /* ─────────────────────────────────────────
     HERO INIT (HERO-01)
  ───────────────────────────────────────── */
  function initHero(cfg) {
    const titleLeft  = document.getElementById('hero-title-left');
    const titleRight = document.getElementById('hero-title-right');
    const img        = document.getElementById('hero-img');
    const subtitle   = document.getElementById('hero-subtitle-el');
    const ctaEl      = document.getElementById('hero-cta-el');
    const ctaText    = document.getElementById('hero-cta-text');

    if (titleLeft)  titleLeft.textContent  = cfg.hero_titolo_sx || '';
    if (titleRight) titleRight.textContent = cfg.hero_titolo_dx || '';

    // Immagine hero
    const imgPath = sanitizeImgPath(cfg.hero_foto) || sanitizeImgPath(cfg.hero_placeholder);
    if (img && imgPath) img.src = imgPath;
    else if (img) img.style.display = 'none';

    if (subtitle && cfg.hero_sottotitolo) subtitle.textContent = cfg.hero_sottotitolo;
    else if (subtitle) subtitle.style.display = 'none';

    const href = buildCtaHref(cfg.hero_cta_tipo, cfg.hero_cta_contatto);
    if (ctaEl && href && cfg.hero_cta_testo) {
      ctaEl.href = href;
      if (cfg.hero_cta_tipo === 'WHATSAPP') ctaEl.target = '_blank';
      if (ctaText) ctaText.textContent = cfg.hero_cta_testo;
    } else if (ctaEl) {
      ctaEl.style.display = 'none';
    }

    // Stagger animation (HERO-01)
    const photo = document.querySelector('.hero-photo-wrap');
    const seq = [
      { el: photo,       delay: 0    },
      { el: titleLeft,   delay: 200  },
      { el: titleRight,  delay: 400  },
      { el: subtitle,    delay: 700  },
      { el: ctaEl,       delay: 800  }
    ];

    seq.forEach(({ el, delay }) => {
      if (!el) return;
      setTimeout(() => {
        el.style.transition = 'opacity 0.8s cubic-bezier(0.22,1,0.36,1), transform 0.8s cubic-bezier(0.22,1,0.36,1)';
        el.style.opacity = '1';
        if (delay > 0) el.style.transform = 'none';
      }, delay);
    });

    // HERO-S02: subtle tilt on mousemove
    const heroSection = document.getElementById('hero');
    const photoWrap   = document.querySelector('.hero-photo-wrap');
    if (heroSection && photoWrap && !window.matchMedia('(pointer:coarse)').matches) {
      heroSection.addEventListener('mousemove', (e) => {
        const rect = heroSection.getBoundingClientRect();
        const nx = (e.clientX - rect.left) / rect.width - 0.5; // -0.5 to 0.5
        photoWrap.style.transform = `rotate(${nx * 1.5}deg) translateX(${nx * 4}px)`;
        photoWrap.style.transition = 'transform 300ms ease';
      });
      heroSection.addEventListener('mouseleave', () => {
        photoWrap.style.transform = '';
      });
    }
  }

  /* ─────────────────────────────────────────
     SERVIZI INIT (SERV-01)
  ───────────────────────────────────────── */
  function initServizi(cfg) {
    if (!isOn(cfg.servizi_attivi)) {
      hideEl('servizi');
      return;
    }

    const titleEl = document.getElementById('servizi-title');
    if (titleEl) titleEl.textContent = cfg.servizi_titolo || 'Le Lezioni';

    // Foto sezione
    const servImg   = document.getElementById('servizi-img');
    const imgPath   = sanitizeImgPath(cfg.servizio_1_foto) || sanitizeImgPath(cfg.servizio_1_placeholder);
    if (servImg && imgPath) servImg.src = imgPath;
    else if (servImg) servImg.closest('.servizi-foto-wrap').style.display = 'none';

    // Lista servizi
    const lista = document.getElementById('servizi-lista');
    if (!lista) return;

    let itemIndex = 0;
    for (let n = 1; n <= 6; n++) {
      if (!isOn(cfg[`servizio_${n}_attivo`])) continue;
      const nome = cfg[`servizio_${n}_nome`];
      if (!nome) continue;

      itemIndex++;
      const item = document.createElement('div');
      item.className = 'servizio-item';
      item.dataset.staggerIndex = itemIndex;

      const lineDraw = document.createElement('div');
      lineDraw.className = 'line-draw';
      item.appendChild(lineDraw);

      const header = document.createElement('div');
      header.className = 'servizio-header';

      const nomeEl = document.createElement('span');
      nomeEl.className = 'servizio-nome';
      nomeEl.innerHTML = nome + `<sup class="servizio-numero">${String(itemIndex).padStart(2,'0')}</sup>`;

      const prezzoEl = document.createElement('span');
      prezzoEl.className = 'servizio-prezzo';
      prezzoEl.textContent = cfg[`servizio_${n}_prezzo`] || '';

      header.appendChild(nomeEl);
      if (cfg[`servizio_${n}_prezzo`]) header.appendChild(prezzoEl);
      item.appendChild(header);

      const descTxt = cfg[`servizio_${n}_descrizione`];
      if (descTxt) {
        const desc = document.createElement('p');
        desc.className = 'servizio-desc t-body';
        desc.textContent = descTxt;
        item.appendChild(desc);
      }

      lista.appendChild(item);
    }

    // PDF
    const pdfWrap = document.getElementById('pdf-cta-wrap');
    const pdfBtn  = document.getElementById('pdf-cta-btn');
    const pdfText = document.getElementById('pdf-cta-text');
    if (isOn(cfg.pdf_menu_attivo) && sanitizeImgPath(cfg.pdf_menu_url)) {
      const pdfPath = sanitizeImgPath(cfg.pdf_menu_url);
      if (pdfBtn) pdfBtn.href = pdfPath;
      if (pdfText) pdfText.textContent = cfg.pdf_menu_testo_bottone || 'Scarica il programma';
      if (pdfWrap) pdfWrap.style.display = 'block';
    }

    // SERV-01: Line-draw stagger on scroll
    const listaEl = document.getElementById('servizi-lista');
    const servObs = new IntersectionObserver((entries) => {
      if (!entries[0].isIntersecting) return;
      const items = listaEl.querySelectorAll('.servizio-item');
      items.forEach((item, i) => {
        setTimeout(() => {
          item.classList.add('drawn');
          setTimeout(() => {
            item.style.opacity = '1';
            item.style.transform = 'none';
          }, 200);
        }, i * 120);
        item.style.opacity = '0';
        item.style.transform = 'translateX(-8px)';
        item.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
      });
      servObs.disconnect();
    }, { threshold: 0.1 });

    if (listaEl) servObs.observe(listaEl);
  }

  /* ─────────────────────────────────────────
     GALLERIA STANDARD — BENTO (GAL-01)
  ───────────────────────────────────────── */
  function initGalleria(cfg) {
    if (!isOn(cfg.galleria_attiva)) {
      hideEl('galleria');
      return;
    }

    const titleEl = document.getElementById('galleria-title');
    if (titleEl) titleEl.textContent = cfg.galleria_titolo || 'La Pratica';

    const grid = document.getElementById('bento-grid');
    if (!grid) return;

    const activeFotos = [];
    for (let n = 1; n <= 9; n++) {
      if (!isOn(cfg[`foto_${n}_attiva`])) continue;
      const url = sanitizeImgPath(cfg[`foto_${n}_url`]) || sanitizeImgPath(cfg[`foto_${n}_placeholder`]);
      if (!url) continue;
      activeFotos.push({ n, url, did: cfg[`foto_${n}_didascalia`] || '' });
    }

    if (activeFotos.length < 4) {
      // Meno di 4 foto: layout semplice a 2 colonne
      hideEl('galleria');
      return;
    }

    const count = activeFotos.length;
    const bentoClass = `bento-${Math.min(count, 9)}`;
    grid.classList.add('bento-grid', bentoClass);

    activeFotos.forEach((foto, i) => {
      const cell = document.createElement('div');
      cell.className = `gallery-cell foto-${i+1}`;
      cell.dataset.galleryIndex = i;

      const img = document.createElement('img');
      img.src = foto.url;
      img.alt = foto.did || `Foto ${i+1}`;
      img.loading = 'lazy';
      cell.appendChild(img);

      grid.appendChild(cell);
    });

    // GAL-01: clip-path stagger reveal
    const galObs = new IntersectionObserver((entries) => {
      if (!entries[0].isIntersecting) return;
      const cells = grid.querySelectorAll('.gallery-cell');
      cells.forEach((cell, i) => {
        setTimeout(() => {
          cell.classList.add('revealed');
        }, i * 80);
      });
      galObs.disconnect();
    }, { threshold: 0.05 });

    galObs.observe(grid);
  }

    for (let n = 1; n <= 20; n++) {
      if (!isOn(cfg[`foto_estesa_${n}_attiva`])) continue;
      const url = sanitizeImgPath(cfg[`foto_estesa_${n}_url`]) || sanitizeImgPath(cfg[`foto_estesa_${n}_placeholder`]);
      if (!url) continue;
      fotos.push(url);
    }

    if (fotos.length === 0) return;

    // Mostra bottone
    if (footer) footer.style.display = 'block';
    if (btnText) btnText.textContent = cfg.galleria_estesa_testo_bottone || 'Vedi tutte le foto';

    // Build thumbnails
    fotos.forEach((url, i) => {
      const thumb = document.createElement('div');
      thumb.className = 'ge-thumb' + (i === 0 ? ' active' : '');
      const img = document.createElement('img');
      img.src = url;
      img.alt = `Foto estesa ${i+1}`;
      img.loading = 'lazy';
      thumb.appendChild(img);
      thumb.addEventListener('click', () => goTo(i));
      if (thumbsCont) thumbsCont.appendChild(thumb);
    });

    let current = 0;

    function goTo(index) {
      if (!mainImg) return;
      mainImg.classList.add('fading');
      setTimeout(() => {
        current = (index + fotos.length) % fotos.length;
        mainImg.src = fotos[current];
        mainImg.alt = `Foto ${current+1}`;
        mainImg.classList.remove('fading');
        if (counter) counter.textContent = `${String(current+1).padStart(2,'0')} / ${String(fotos.length).padStart(2,'0')}`;
        // Update thumbs
        const thumbs = thumbsCont.querySelectorAll('.ge-thumb');
        thumbs.forEach((t, i) => t.classList.toggle('active', i === current));
        // Scroll thumb into view
        if (thumbs[current]) thumbs[current].scrollIntoView({ behavior:'smooth', block:'nearest' });
      }, 260);
    }

    function openOverlay() {
      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden', false);
      document.body.style.overflow = 'hidden';
      goTo(0);
    }

    function closeOverlay() {
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', true);
      document.body.style.overflow = '';
    }

    btn && btn.addEventListener('click', openOverlay);
    closeBtn && closeBtn.addEventListener('click', closeOverlay);
    prevBtn && prevBtn.addEventListener('click', () => goTo(current - 1));
    nextBtn && nextBtn.addEventListener('click', () => goTo(current + 1));

    document.addEventListener('keydown', (e) => {
      if (!overlay.classList.contains('open')) return;
      if (e.key === 'Escape')       closeOverlay();
      if (e.key === 'ArrowLeft')    goTo(current - 1);
      if (e.key === 'ArrowRight')   goTo(current + 1);
    });
  }

  /* ─────────────────────────────────────────
     RECENSIONI (REC-01)
  ───────────────────────────────────────── */
  function initRecensioni(cfg) {
    if (!isOn(cfg.recensioni_attive)) {
      hideEl('recensioni');
      return;
    }

    const titleEl  = document.getElementById('rec-title');
    if (titleEl) titleEl.textContent = cfg.recensioni_titolo || 'Cosa dicono';

    const recList = [];
    for (let n = 1; n <= 5; n++) {
      if (!isOn(cfg[`recensione_${n}_attiva`])) continue;
      const testo = cfg[`recensione_${n}_testo`];
      if (!testo) continue;
      recList.push({
        nome:  cfg[`recensione_${n}_nome`]  || 'Anonimo',
        testo: testo,
        stelle:cfg[`recensione_${n}_stelle`]|| '5'
      });
    }

    if (recList.length === 0) { hideEl('recensioni'); return; }

    const textEl   = document.getElementById('rec-text-el');
    const authorEl = document.getElementById('rec-author-el');
    const avatarEl = document.getElementById('rec-avatar-el');
    const nameEl   = document.getElementById('rec-name-el');
    const starsEl  = document.getElementById('rec-stars-el');
    const navEl    = document.getElementById('rec-nav');

    let current = 0;

    function render(index) {
      const r = recList[index];
      if (!r) return;

      // REC-01: crossfade con micro-translateY
      if (textEl)   textEl.classList.add('fading');
      if (authorEl) authorEl.classList.add('fading');

      setTimeout(() => {
        if (textEl)   textEl.textContent  = '"' + r.testo + '"';
        if (avatarEl) avatarEl.textContent = initials(r.nome);
        if (nameEl)   nameEl.textContent   = r.nome;
        if (starsEl)  starsEl.textContent  = starsHtml(r.stelle);

        if (textEl)   textEl.classList.remove('fading');
        if (authorEl) authorEl.classList.remove('fading');
        if (textEl) {
          textEl.style.transform = 'translateY(12px)';
          textEl.style.opacity = '0';
          requestAnimationFrame(() => {
            textEl.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
            textEl.style.transform = 'none';
            textEl.style.opacity = '1';
          });
        }
      }, 260);
    }

    render(0);

    // Nav buttons
    if (navEl && recList.length > 1) {
      const prev = document.createElement('button');
      prev.className = 'rec-nav-btn';
      prev.textContent = '← Precedente';
      prev.addEventListener('click', () => { current = (current - 1 + recList.length) % recList.length; render(current); });

      const next = document.createElement('button');
      next.className = 'rec-nav-btn';
      next.textContent = 'Successiva →';
      next.addEventListener('click', () => { current = (current + 1) % recList.length; render(current); });

      navEl.appendChild(prev);
      navEl.appendChild(next);
    }
  }

  /* ─────────────────────────────────────────
     FAQ (FAQ-01)
  ───────────────────────────────────────── */
  function initFaq(cfg) {
    const lista = document.getElementById('faq-lista');
    if (!lista) return;

    let built = 0;
    for (let n = 1; n <= 10; n++) {
      if (!isOn(cfg[`faq_${n}_attiva`])) continue;
      const q = cfg[`faq_${n}_domanda`];
      const a = cfg[`faq_${n}_risposta`];
      if (!q) continue;

      built++;
      const item = document.createElement('div');
      item.className = 'faq-item';
      if (built === 1) item.classList.add('open'); // prima aperta

      item.innerHTML = `
        <div class="faq-header" role="button" tabindex="0" aria-expanded="${built===1}">
          <span class="faq-question">${q}</span>
          <span class="faq-icon" aria-hidden="true">
            <span class="faq-icon-h"></span>
            <span class="faq-icon-v"></span>
          </span>
        </div>
        <div class="faq-body" role="region">
          <div class="faq-body-inner">
            <p class="faq-answer t-body">${a || ''}</p>
          </div>
        </div>
      `;

      lista.appendChild(item);

      const header = item.querySelector('.faq-header');
      header.addEventListener('click', () => toggleFaq(item));
      header.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleFaq(item); }
      });
    }

    if (built === 0) {
      document.getElementById('faq').style.display = 'none';
    }

    function toggleFaq(item) {
      const isOpen = item.classList.contains('open');
      // Chiudi tutti
      lista.querySelectorAll('.faq-item').forEach(i => {
        i.classList.remove('open');
        i.querySelector('.faq-header').setAttribute('aria-expanded', false);
      });
      if (!isOpen) {
        item.classList.add('open');
        item.querySelector('.faq-header').setAttribute('aria-expanded', true);
      }
    }
  }

  /* ─────────────────────────────────────────
     FOOTER + CTA (FOOTER-01)
  ───────────────────────────────────────── */
  function initFooter(cfg) {
    // CTA title split-word reveal (FOOTER-01)
    const ctaHead = document.getElementById('cta-heading');
    if (ctaHead) {
      const words = (ctaHead.textContent || 'INIZIAMO').trim().split(' ');
      ctaHead.innerHTML = words.map(w =>
        `<span class="cta-title-word">${w}</span>`
      ).join(' ');

      const ctaObs = new IntersectionObserver((entries) => {
        if (!entries[0].isIntersecting) return;
        ctaHead.querySelectorAll('.cta-title-word').forEach((w, i) => {
          setTimeout(() => w.classList.add('revealed'), i * 150);
        });
        ctaObs.disconnect();
      }, { threshold: 0.2 });
      ctaObs.observe(ctaHead);
    }

    // Contact items reveal
    const contItems = document.querySelectorAll('.contact-item');
    const pillWrap  = document.getElementById('cta-pill-wrap');
    const contObs   = new IntersectionObserver((entries) => {
      if (!entries[0].isIntersecting) return;
      contItems.forEach((item, i) => {
        setTimeout(() => item.classList.add('revealed'), 600 + i * 100);
      });
      if (pillWrap) setTimeout(() => pillWrap.classList.add('revealed'), 900);
      contObs.disconnect();
    }, { threshold: 0.2 });
    if (contItems[0]) contObs.observe(contItems[0].closest('.cta-left') || contItems[0]);

    // Telefono
    const tel = cfg.footer_telefono || cfg.footer_whatsapp;
    if (tel) {
      showEl('contact-tel-wrap', 'block');
      const telLink = document.getElementById('contact-tel-link');
      if (telLink) {
        telLink.textContent = tel;
        telLink.href = 'tel:' + sanitizeTel(tel);
      }
    }

    // Email
    if (cfg.footer_email) {
      showEl('contact-email-wrap', 'block');
      const emailLink = document.getElementById('contact-email-link');
      if (emailLink) {
        emailLink.textContent = cfg.footer_email;
        emailLink.href = 'mailto:' + cfg.footer_email;
      }
    }

    // Orari
    if (cfg.footer_orari) {
      showEl('contact-orari-wrap', 'block');
      setText('contact-orari-el', cfg.footer_orari);
    }

    // CTA pill
    const ctaPill = document.getElementById('footer-cta-pill');
    const ctaHref = buildCtaHref(cfg.footer_cta_tipo, cfg.footer_whatsapp || cfg.footer_telefono);
    if (ctaHref && cfg.footer_cta_testo) {
      showEl('cta-pill-wrap', 'block');
      ctaPill.textContent = cfg.footer_cta_testo;
      ctaPill.href = ctaHref;
      if (cfg.footer_cta_tipo === 'WHATSAPP') ctaPill.target = '_blank';
      // FOOTER-S01: WhatsApp hover color
      ctaPill.addEventListener('mouseenter', () => {
        if (cfg.footer_cta_tipo === 'WHATSAPP') ctaPill.style.background = '#25D366';
      });
      ctaPill.addEventListener('mouseleave', () => {
        ctaPill.style.background = '';
      });
    }

    // Indirizzo
    const addrEl = document.getElementById('footer-address-el');
    if (addrEl && cfg.footer_indirizzo) addrEl.textContent = cfg.footer_indirizzo;

    // Mappa
    if (isOn(cfg.footer_mappa_attiva) && sanitizeImgPath(cfg.footer_mappa_url)) {
      showEl('cta-mappa-wrap', 'block');
      const mapImg = document.getElementById('footer-mappa-img');
      if (mapImg) mapImg.src = sanitizeImgPath(cfg.footer_mappa_url);
    }

    // ── FOOTER REALE ──
    // Logo footer
    const footerLogoWrap = document.getElementById('footer-logo-wrap');
    if (footerLogoWrap) {
      if (cfg.navbar_logo_tipo === 'IMMAGINE' && sanitizeImgPath(cfg.navbar_logo_immagine)) {
        const div = document.createElement('div');
        div.className = 'footer-logo-img-wrap';
        const img = document.createElement('img');
        img.src = sanitizeImgPath(cfg.navbar_logo_immagine);
        img.alt = cfg.navbar_logo_testo || 'Logo';
        div.appendChild(img);
        footerLogoWrap.appendChild(div);
      } else {
        const span = document.createElement('span');
        span.className = 'footer-logo-text';
        span.textContent = cfg.navbar_logo_testo || '';
        footerLogoWrap.appendChild(span);
      }
    }

    // Social
    const socialWrap = document.getElementById('footer-social');
    if (socialWrap) {
      const socials = [
        { key: cfg.footer_instagram, label: 'IG' },
        { key: cfg.footer_facebook,  label: 'FB' }
      ];
      socials.forEach(({ key, label }) => {
        if (!key) return;
        const a = document.createElement('a');
        a.className = 'social-pill';
        a.textContent = label;
        a.href = sanitizeUrl(key);
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        socialWrap.appendChild(a);
      });
    }

    // Copyright
    const copyEl = document.getElementById('footer-copy');
    if (copyEl) {
      const nome = cfg.footer_nome || cfg.navbar_logo_testo || '';
      copyEl.textContent = `© ${new Date().getFullYear()} ${nome}. Tutti i diritti riservati.`;
    }

    // Crediti Ompage
    const credEl = document.getElementById('footer-credits');
    if (credEl) {
      if (isOn(cfg.crediti_ompage_footer)) {
        credEl.innerHTML = 'Sito realizzato da <a href="https://ompage.it" target="_blank" rel="noopener">Ompage</a>';
      } else {
        credEl.style.display = 'none';
      }
    }
  }

  /* ─────────────────────────────────────────
     FETCH + BOOTSTRAP
  ───────────────────────────────────────── */
  fetch('config.json')
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(data => {
      window.siteConfig = data;
      updateTemi(data);
      updateSEO(data);
      initWatermark(data);
      initBarra(data);
      initMobileMenu();
      buildNavbar(data);
      initNavbarScroll();
      initBadgeMobile(data);
      initPopup(data);
      initCursor();
      initAmbientGlow();
      document.dispatchEvent(new CustomEvent('configLoaded', { detail: data }));
    })
    .catch(err => {
      console.error('[Ompage] Errore critico config.json:', err);
      const banner = document.createElement('div');
      banner.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#c0392b;color:#fff;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:18px;text-align:center;padding:20px;';
      banner.innerHTML = 'ERRORE DI SISTEMA<br><br>Il file config.json è danneggiato o contiene errori di sintassi.';
      document.body.prepend(banner);
    });

  /* ─────────────────────────────────────────
     SEZIONI — ascoltano configLoaded
  ───────────────────────────────────────── */
  document.addEventListener('configLoaded', (e) => {
    const cfg = e.detail;
    initHero(cfg);
    initChiSiamo(cfg);
    initServizi(cfg);
    initGalleria(cfg);
    initGalleriaEstesa(cfg);
    initRecensioni(cfg);
    initFaq(cfg);
    initFooter(cfg);
    // Reveal observer last (dopo che il DOM è popolato)
    initRevealObserver();
  });

  </script>
</body>
