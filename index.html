<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yoga privato</title>
  <meta name="description" content="Lezioni private di yoga su misura.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Yoga privato">
  <meta property="og:description" content="Lezioni private di yoga su misura.">
  <meta property="og:image" content="">
  <meta name="theme-color" content="#f4eee6">
  <script type="application/ld+json" id="schema-json"></script>
  
  <!-- Font dinamici verranno iniettati qui da JS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style id="dynamic-fonts"></style>

  <style>
    /* Variabili CSS di default (NATURA_PASTELLO + LUSSO_SERIF). 
       Verranno sovrascritte dinamicamente da JS. */
    :root {
      --cream: #f7efe6;
      --ivory: #fffaf4;
      --sand: #ead9c8;
      --sage: #b6c2a5;
      --sage-dark: #657255;
      --clay: #bd775b;
      --ink: #241d19;
      --muted: #76685f;
      --line: rgba(36, 29, 25, 0.14);
      --line-strong: rgba(36, 29, 25, 0.24);
      --shadow: 0 22px 70px rgba(58, 37, 23, 0.13);
      --display: "Cormorant Garamond", Georgia, serif;
      --body: "Inter", system-ui, sans-serif;
      --page-pad: 1.25rem;
      --section-pad: 5rem;
      --hero-title: 3.6rem;
      --h2: 3rem;
      --nav-h: 4.75rem;
    }

    @media (min-width: 760px) {
      :root {
        --page-pad: 2.5rem;
        --section-pad: 7rem;
        --hero-title: 6.8rem;
        --h2: 5.4rem;
      }
    }

    @media (min-width: 1180px) {
      :root {
        --page-pad: 4.5rem;
        --section-pad: 8.5rem;
        --hero-title: 9rem;
        --h2: 6.8rem;
      }
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; background: var(--cream); }
    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(232, 189, 166, 0.22), rgba(247, 239, 230, 0) 34rem),
        var(--cream);
      font-family: var(--body);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
      text-rendering: optimizeLegibility;
    }
    body.menu-open, body.lightbox-open, body.popup-open { overflow: hidden; }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    button, input, textarea, select { font: inherit; }
    button { border: 0; background: transparent; color: inherit; cursor: pointer; }
    figure, blockquote { margin: 0; }
    ::selection { background: var(--sage); color: var(--ink); }

    .shell { width: min(100%, 1440px); margin: 0 auto; padding-inline: var(--page-pad); }
    .eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--sage-dark);
      font-weight: 600;
    }
    .serif {
      font-family: var(--display);
      font-weight: 500;
      line-height: 0.95;
      letter-spacing: 0;
    }
    .muted { color: var(--muted); }
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      min-height: 2.75rem;
      padding: 0.72rem 1.2rem;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: rgba(255, 250, 244, 0.35);
      color: var(--ink);
      font-size: 0.86rem;
      font-weight: 500;
      white-space: nowrap;
      transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
    }
    .pill:hover { background: var(--ink); border-color: var(--ink); color: var(--ivory); transform: translateY(-1px); }
    .pill.dark { background: var(--ink); border-color: var(--ink); color: var(--ivory); }
    .pill.dark:hover { background: var(--clay); border-color: var(--clay); }

    [data-reveal] {
      opacity: 0;
      transform: translateY(22px);
      transition: opacity 700ms ease, transform 700ms ease;
    }
    [data-reveal].is-visible { opacity: 1; transform: none; }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { animation: none !important; transition: none !important; }
      [data-reveal] { opacity: 1; transform: none; }
    }

    /* PROMO BAR MARQUEE */
    .promo {
      display: none;
      position: relative;
      z-index: 50;
      min-height: 2.6rem;
      background: var(--ink);
      color: var(--ivory);
      align-items: center;
      font-size: 0.82rem;
      overflow: hidden;
    }
    .promo.is-visible { display: flex; }
    .promo-scroll {
      display: flex;
      white-space: nowrap;
      animation: scroll-left 25s linear infinite;
    }
    .promo-scroll:hover { animation-play-state: paused; }
    .promo-content { padding: 0 2rem; display: inline-flex; gap: 1rem; align-items: center; }
    .promo a { text-decoration: underline; text-underline-offset: 0.25rem; font-weight: 600; }
    .promo-close { position: absolute; right: 0; top: 0; bottom: 0; width: 3rem; background: var(--ink); display: grid; place-items: center; z-index: 2; border-left: 1px solid rgba(255,255,255,0.1); }
    @keyframes scroll-left { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

    .site-nav {
      position: fixed;
      inset: 0 0 auto 0;
      height: var(--nav-h);
      z-index: 40;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding-inline: var(--page-pad);
      transition: background 220ms ease, border-color 220ms ease, transform 220ms ease;
      border-bottom: 1px solid transparent;
    }
    .promo.is-visible + .site-nav { top: 2.6rem; }
    .site-nav.is-scrolled {
      background: var(--cream);
      backdrop-filter: blur(18px);
      border-color: var(--line);
    }
    .nav-menu { justify-self: start; }
    .nav-brand { justify-self: center; font-family: var(--display); font-size: 2rem; line-height: 1; }
    .nav-brand img { max-width: 8.5rem; max-height: 2.8rem; object-fit: contain; }
    .nav-cta { justify-self: end; }
    .nav-cta .pill { min-height: 2.55rem; }

    .mobile-panel {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      background: var(--cream);
      color: var(--ink);
      padding: 6.5rem var(--page-pad) 2rem;
    }
    .mobile-panel.is-open { display: grid; align-content: center; }
    .mobile-close { position: absolute; top: 1.4rem; right: var(--page-pad); }
    .mobile-links { display: grid; gap: 1rem; }
    .mobile-links a { border-bottom: 1px solid var(--line); padding-bottom: 0.85rem; font-family: var(--display); font-size: 3rem; line-height: 1; }

    /* HERO */
    .hero { min-height: 100svh; display: grid; align-items: end; padding-top: 7rem; padding-bottom: 3rem; position: relative; overflow: hidden; }
    .hero::before { content: ""; position: absolute; inset: auto 0 0 0; height: 24rem; background: linear-gradient(180deg, rgba(247, 239, 230, 0), rgba(182, 194, 165, 0.24)); pointer-events: none; }
    .hero-grid { position: relative; display: grid; gap: 2.4rem; align-items: end; }
    .hero-copy { max-width: 62rem; position: relative; z-index: 2; }
    .hero-kicker { display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem; margin-bottom: 1.2rem; }
    .hero-kicker::before { content: ""; width: 3.2rem; height: 1px; background: var(--ink); opacity: 0.45; }
    .hero-title { margin: 0; font-size: var(--hero-title); text-transform: uppercase; max-width: 14ch; }
    .hero-subtitle { max-width: 32rem; margin: 1.35rem 0 0; font-size: 1.08rem; color: var(--muted); }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 0.8rem; align-items: center; margin-top: 1.7rem; }
    .hero-note { display: inline-flex; align-items: center; min-height: 2.75rem; color: var(--muted); font-size: 0.88rem; }
    .hero-media { position: relative; z-index: 1; border-radius: 8px; overflow: hidden; min-height: 22rem; box-shadow: var(--shadow); background: var(--sand); border: 1px solid rgba(255, 250, 244, 0.48); }
    .hero-media img { width: 100%; height: 100%; object-fit: cover; min-height: 22rem; }
    .hero-caption { position: absolute; right: 1rem; bottom: 1rem; padding: 0.62rem 0.8rem; border-radius: 999px; background: rgba(255, 250, 244, 0.72); backdrop-filter: blur(14px); font-size: 0.78rem; color: var(--ink); }
    
    /* Layout varianti Hero */
    .hero.layout-solo-testo .hero-grid { grid-template-columns: 1fr; align-items: center; text-align: center; justify-items: center; }
    .hero.layout-solo-testo .hero-kicker { justify-content: center; }
    .hero.layout-solo-testo .hero-kicker::before { display: none; }
    .hero.layout-solo-testo .hero-title { max-width: 20ch; }
    .hero.layout-solo-testo .hero-media { display: none; }
    .hero.layout-solo-testo .hero-actions { justify-content: center; }
    
    @media (min-width: 900px) {
      .hero-grid { grid-template-columns: minmax(0, 1.05fr) minmax(23rem, 0.72fr); }
      .hero-media, .hero-media img { min-height: 39rem; }
      .hero.layout-solo-testo .hero-grid { grid-template-columns: 1fr; }
    }

    /* SECTIONS */
    .section { padding-block: var(--section-pad); border-top: 1px solid var(--line); position: relative; }
    .section.alt { background: rgba(255, 250, 244, 0.52); }
    .section.sage { background: rgba(182, 194, 165, 0.22); }
    .section-head { display: grid; gap: 1rem; align-items: end; margin-bottom: 2.5rem; }
    .section-title { margin: 0; font-size: var(--h2); max-width: 11ch; text-transform: uppercase; }
    .section-intro { max-width: 34rem; color: var(--muted); margin: 0; }
    @media (min-width: 850px) { .section-head { grid-template-columns: minmax(0, 0.9fr) minmax(20rem, 0.55fr); } }

    /* CHI SIAMO */
    .about-grid { display: grid; gap: 2rem; align-items: stretch; }
    .about-media { border-radius: 8px; overflow: hidden; background: var(--sand); min-height: 28rem; }
    .about-media img { width: 100%; height: 100%; object-fit: cover; min-height: 28rem; }
    .about-copy { display: grid; align-content: space-between; gap: 2rem; padding-block: 0.6rem; }
    .quote { margin: 0; padding-left: 1.2rem; border-left: 1px solid var(--line-strong); font-family: var(--display); font-size: 1.7rem; line-height: 1.25; }
    .signature { display: grid; gap: 0.2rem; }
    .signature strong { font-family: var(--display); font-size: 1.55rem; font-weight: 500; }
    .steps { display: grid; gap: 1px; margin-top: 2.5rem; background: var(--line); border: 1px solid var(--line); }
    .step { background: rgba(255, 250, 244, 0.64); padding: 1.4rem; min-height: 10rem; }
    .step-number { color: var(--clay); margin-bottom: 1.5rem; }
    .step h3 { margin: 0 0 0.5rem; font-family: var(--display); font-size: 1.75rem; font-weight: 500; }
    .step p { margin: 0; color: var(--muted); }
    
    /* Varianti Chi Siamo */
    .layout-solo-testo .about-media { display: none; }
    .layout-solo-testo .about-grid { grid-template-columns: 1fr !important; }
    .layout-passi .about-grid { display: none; } /* Nasconde foto e citazione, mostra solo gli step */

    @media (min-width: 900px) {
      .about-grid { grid-template-columns: minmax(21rem, 0.65fr) minmax(0, 1fr); gap: 4rem; }
      .steps { grid-template-columns: repeat(3, 1fr); }
    }

    /* SERVIZI */
    .services { display: grid; border-top: 1px solid var(--line); }
    .service { display: grid; gap: 1.2rem; padding: 1.4rem 0; border-bottom: 1px solid var(--line); align-items: center; }
    .service-media { width: 100%; aspect-ratio: 4 / 3; border-radius: 8px; overflow: hidden; background: var(--sand); }
    .service-media img { width: 100%; height: 100%; object-fit: cover; }
    .service h3 { margin: 0; font-family: var(--display); font-size: 2rem; font-weight: 500; }
    .service p { margin: 0.45rem 0 0; color: var(--muted); max-width: 42rem; }
    .service-price { justify-self: start; font-family: var(--display); font-size: 1.65rem; white-space: nowrap; }
    
    /* Variante Griglia Servizi */
    .services.layout-griglia { grid-template-columns: repeat(auto-fit, minmax(18rem, 1fr)); gap: 2rem; border-top: 0; }
    .services.layout-griglia .service { grid-template-columns: 1fr; border-bottom: 0; padding: 0; background: rgba(255,250,244,0.4); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .services.layout-griglia .service-media { border-radius: 0; aspect-ratio: 16/9; }
    .services.layout-griglia .service > div { padding: 0 1.4rem; }
    .services.layout-griglia .service-price { padding: 0 1.4rem 1.4rem; }

    @media (min-width: 780px) {
      .services:not(.layout-griglia) .service { grid-template-columns: 11rem minmax(0, 1fr) auto; padding: 1.25rem 0; }
      .services:not(.layout-griglia) .service-media { aspect-ratio: 1 / 1; }
    }

    /* GALLERIA */
    .gallery-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.75rem; }
    .gallery-item { position: relative; min-height: 15rem; border-radius: 8px; overflow: hidden; background: var(--sand); isolation: isolate; cursor: pointer;}
    .gallery-item:nth-child(3n + 1) { grid-row: span 2; min-height: 25rem; }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 650ms ease; }
    .gallery-item:hover img { transform: scale(1.04); }
    .gallery-item figcaption { position: absolute; inset: auto 0 0 0; padding: 2rem 1rem 1rem; color: var(--ivory); background: linear-gradient(180deg, rgba(36, 29, 25, 0), rgba(36, 29, 25, 0.58)); font-size: 0.85rem; }
    .gallery-actions { margin-top: 1.4rem; display: flex; justify-content: center; }
    @media (min-width: 900px) {
      .gallery-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .gallery-item:nth-child(4n + 2) { margin-top: 3rem; }
    }

    /* RECENSIONI, FAQ, CONTATTI, FOOTER, LIGHTBOX */
    .reviews-wrap { display: grid; gap: 2rem; align-items: end; }
    .review-stage { min-height: 22rem; display: grid; align-content: center; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); padding-block: 2rem; }
    .review-text { margin: 0; font-family: var(--display); font-size: 2.15rem; line-height: 1.2; max-width: 55rem; }
    .review-meta { margin-top: 1.3rem; display: flex; flex-wrap: wrap; gap: 0.8rem 1.2rem; align-items: center; color: var(--muted); }
    .review-nav { display: flex; gap: 0.7rem; }
    .round { width: 2.8rem; height: 2.8rem; border-radius: 50%; border: 1px solid var(--line-strong); background: rgba(255, 250, 244, 0.35); }
    @media (min-width: 900px) { .reviews-wrap { grid-template-columns: minmax(0, 1fr) auto; } .review-text { font-size: 3rem; } }

    .faq-list { border-top: 1px solid var(--line); }
    details { border-bottom: 1px solid var(--line); padding: 1.15rem 0; }
    summary { display: flex; align-items: center; justify-content: space-between; gap: 1rem; cursor: pointer; list-style: none; font-family: var(--display); font-size: 1.55rem; line-height: 1.2; }
    summary::-webkit-details-marker { display: none; }
    summary::after { content: "+"; width: 2.2rem; height: 2.2rem; display: inline-grid; place-items: center; border: 1px solid var(--line); border-radius: 50%; flex: 0 0 auto; font-family: var(--body); font-size: 1rem; }
    details[open] summary::after { content: "-"; }
    details p { margin: 1rem 0 0; color: var(--muted); max-width: 52rem; }

    .contact { padding-block: var(--section-pad); background: var(--ink); color: var(--ivory); }
    .contact .shell { display: grid; gap: 3rem; }
    .contact-title { margin: 0; font-family: var(--display); font-size: var(--h2); line-height: 0.95; text-transform: uppercase; max-width: 10ch; }
    .contact-grid { display: grid; gap: 1px; background: rgba(255, 250, 244, 0.18); border: 1px solid rgba(255, 250, 244, 0.18); }
    .contact-item { background: rgba(255, 250, 244, 0.04); padding: 1.2rem; min-height: 7.2rem; }
    .contact-item span { display: block; color: rgba(255, 250, 244, 0.6); font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 1rem; }
    .contact-item strong, .contact-item a { font-size: 1rem; font-weight: 500; }
    .contact .pill { color: var(--ivory); border-color: rgba(255, 250, 244, 0.36); background: transparent; }
    .contact .pill:hover { background: var(--ivory); color: var(--ink); }
    @media (min-width: 860px) { .contact .shell { grid-template-columns: minmax(0, 0.9fr) minmax(24rem, 0.7fr); align-items: start; } .contact-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }

    .footer { padding: 2rem var(--page-pad); background: var(--ink); color: rgba(255, 250, 244, 0.68); border-top: 1px solid rgba(255, 250, 244, 0.16); display: flex; flex-wrap: wrap; gap: 1rem; justify-content: space-between; font-size: 0.82rem; }
    .footer a { color: var(--ivory); }

    .watermark { display: none; position: fixed; left: 1rem; bottom: 1rem; z-index: 70; border: 1px solid rgba(36, 29, 25, 0.2); border-radius: 999px; background: rgba(255, 250, 244, 0.72); backdrop-filter: blur(14px); padding: 0.55rem 0.8rem; color: var(--muted); font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .watermark.is-visible { display: block; }

    .popup { position: fixed; inset: 0; z-index: 80; display: none; place-items: center; padding: 1.2rem; background: rgba(36, 29, 25, 0.38); backdrop-filter: blur(10px); }
    .popup.is-visible { display: grid; }
    .popup-card { width: min(100%, 30rem); border-radius: 8px; background: var(--ivory); padding: 2rem; box-shadow: var(--shadow); }
    .popup-card p { margin: 0 0 1.3rem; color: var(--muted); }
    .popup-actions { display: flex; gap: 0.8rem; flex-wrap: wrap; }

    .lightbox { position: fixed; inset: 0; z-index: 90; display: none; background: rgba(36, 29, 25, 0.92); color: var(--ivory); padding: 1rem; }
    .lightbox.is-open { display: grid; grid-template-rows: auto 1fr auto; gap: 1rem; }
    .lightbox-top, .lightbox-bottom { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .lightbox-frame { min-height: 0; display: grid; place-items: center; }
    .lightbox-frame img { max-height: 100%; width: auto; max-width: 100%; border-radius: 8px; object-fit: contain; }
    .lightbox .round { color: var(--ivory); border-color: rgba(255, 250, 244, 0.38); }

    .load-error { display: none; position: fixed; right: 1rem; bottom: 1rem; z-index: 100; width: min(26rem, calc(100vw - 2rem)); border: 1px solid rgba(189, 119, 91, 0.34); border-radius: 8px; background: var(--ivory); box-shadow: var(--shadow); padding: 1rem; color: var(--muted); font-size: 0.9rem; }
    .load-error.is-visible { display: block; }

    @media (max-width: 680px) {
      .nav-cta { display: none; }
      .site-nav { grid-template-columns: 1fr auto 1fr; }
      .hero { padding-bottom: 2rem; }
      .hero-title { max-width: 8ch; }
      .hero-subtitle { max-width: 19.5rem; }
      .hero-media { min-height: 20rem; }
      .section-title, .contact-title { max-width: 9ch; }
      .mobile-links a { font-size: 2.4rem; }
      .review-text { font-size: 1.9rem; }
      .gallery-grid { grid-template-columns: 1fr; }
      .gallery-item:nth-child(n) { grid-row: auto; min-height: 20rem; }
    }
  </style>

  </head>
<body>
  <div class="promo" id="promo">
    <div class="promo-scroll">
      <div class="promo-content">
        <span id="promo-text"></span>
        <a id="promo-link" href="#contatti"></a>
      </div>
      <!-- Duplicato per creare l'effetto infinito (Marquee) -->
      <div class="promo-content">
        <span id="promo-text-dup"></span>
        <a id="promo-link-dup" href="#contatti"></a>
      </div>
    </div>
    <button class="promo-close" type="button" aria-label="Chiudi promozione">x</button>
  </div>

  <nav class="site-nav" id="site-nav" aria-label="Navigazione principale">
    <button class="pill nav-menu" type="button" id="menu-open">Menu</button>
    <a class="nav-brand" id="nav-brand" href="#top" aria-label="Torna all'inizio">Yoga</a>
    <a class="nav-cta pill" id="nav-cta" href="#contatti">Prenota</a>
  </nav>

  <div class="mobile-panel" id="mobile-panel" aria-hidden="true">
    <button class="pill mobile-close" type="button" id="menu-close">Chiudi</button>
    <div class="mobile-links" id="mobile-links"></div>
  </div>

  <main id="top">
    <section class="hero shell" id="hero"></section>
    <section class="section alt" id="chi-siamo"></section>
    <section class="section" id="servizi"></section>
    <section class="section sage" id="galleria"></section>
    <section class="section alt" id="recensioni"></section>
    <section class="section" id="faq"></section>
    <section class="contact" id="contatti"></section>
  </main>

  <footer class="footer" id="footer"></footer>
  <div class="watermark" id="watermark">Sito in bozza</div>
  <div class="popup" id="popup" aria-hidden="true"></div>
  <div class="lightbox" id="lightbox" aria-hidden="true"></div>
  <div class="load-error" id="load-error"></div>

  <script>
    "use strict";

    const DEFAULT_CONFIG = {
      seo_titolo: "Yoga privato",
      seo_descrizione: "Lezioni private di yoga su misura.",
      navbar_logo_testo: "Yoga",
      hero_titolo: "RITROVA IL TUO CENTRO",
      hero_sottotitolo: "Lezioni private costruite intorno al tuo corpo, al tuo ritmo e ai tuoi obiettivi.",
      hero_cta_testo: "Prenota una lezione",
      footer_cta_testo: "Scrivimi",
      footer_nome: "Yoga privato"
    };

    const $ = (selector, root = document) => root.querySelector(selector);
    const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));
    const clean = (value) => String(value || "").trim();
    const isOn = (value) => clean(value).toUpperCase() === "SI";
    const esc = (value) => clean(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
    const telClean = (value) => clean(value).replace(/[^\d+]/g, "");

    function svgPlaceholder(label) {
      const safe = clean(label) || "Foto";
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500"><defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#ead9c8"/><stop offset="0.55" stop-color="#f7efe6"/><stop offset="1" stop-color="#b6c2a5"/></linearGradient></defs><rect width="1200" height="1500" fill="url(#g)"/><circle cx="600" cy="640" r="150" fill="none" stroke="#241d19" stroke-opacity=".18" stroke-width="2"/><path d="M470 800c70 78 190 78 260 0" fill="none" stroke="#241d19" stroke-opacity=".2" stroke-width="4" stroke-linecap="round"/><text x="600" y="980" text-anchor="middle" font-family="Georgia, serif" font-size="58" fill="#241d19" fill-opacity=".56">${esc(safe)}</text></svg>`;
      return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
    }

    function imageMarkup(primary, placeholder, alt, label, className = "", loading = "lazy") {
      return `<img class="${esc(className)}" data-primary="${esc(primary)}" data-placeholder="${esc(placeholder)}" data-label="${esc(label || alt)}" alt="${esc(alt)}" loading="${loading}" decoding="async">`;
    }

    function applyImage(img, primary, placeholder, label) {
      const generated = svgPlaceholder(label || img.alt || "Foto");
      const first = clean(primary) || clean(placeholder) || generated;
      const second = clean(primary) && clean(placeholder) ? clean(placeholder) : generated;
      img.dataset.errorStage = "0";
      img.onerror = () => {
        const stage = Number(img.dataset.errorStage || 0);
        if (stage === 0 && second) {
          img.dataset.errorStage = "1";
          img.src = second;
        } else {
          img.onerror = null;
          img.src = generated;
        }
      };
      img.src = first;
    }

    function hydrateImages(root = document) {
      $$("img[data-primary], img[data-placeholder]", root).forEach((img) => {
        applyImage(img, img.dataset.primary, img.dataset.placeholder, img.dataset.label);
      });
    }

    function ctaHref(type, contact) {
      const t = clean(type).toUpperCase();
      const c = clean(contact);
      if (!c) return "#contatti";
      if (t === "WHATSAPP") return `https://wa.me/${telClean(c).replace(/^\+/, "")}`;
      if (t === "TELEFONO" || t === "PHONE") return `tel:${telClean(c)}`;
      if (t === "EMAIL") return `mailto:${c}`;
      if (t === "URL" || t === "LINK") return c;
      return "#contatti";
    }

    function sectionTitle(label, title, intro = "") {
      return `<div class="shell"><div class="section-head" data-reveal><div><div class="eyebrow">${esc(label)}</div><h2 class="section-title serif">${esc(title)}</h2></div>${intro ? `<p class="section-intro">${esc(intro)}</p>` : ""}</div></div>`;
    }

    async function loadConfig() {
      try {
        const response = await fetch("config.json?ts=" + Date.now(), { cache: "no-store" });
        if (!response.ok) throw new Error("HTTP " + response.status);
        return { config: { ...DEFAULT_CONFIG, ...(await response.json()) }, error: null };
      } catch (error) {
        return { config: DEFAULT_CONFIG, error };
      }
    }

    /* THEME ENGINE */
    function applyTheme(cfg) {
      const styleTag = $("#dynamic-fonts");
      let css = ":root {\n";
      let fontsUrl = "";

      // 1. Motore Colori
      const palette = clean(cfg.tema_palette) || "NATURA_PASTELLO";
      if (palette === "TERRA") {
        css += `
          --cream: #f4ece2; --ivory: #faf5f0; --sand: #e0d0bd;
          --sage: #c79e7c; --sage-dark: #8c664b; --clay: #a65842;
          --ink: #2b1f1a; --muted: #735a4d;
        `;
      } else if (palette === "SAGE") {
        css += `
          --cream: #eef2eb; --ivory: #f8fbf5; --sand: #d5decb;
          --sage: #8b9c7b; --sage-dark: #4a5c3d; --clay: #7c8e6a;
          --ink: #1f2b20; --muted: #5e6f5c;
        `;
      } else if (palette === "MINIMALE") {
        css += `
          --cream: #f9f9f9; --ivory: #ffffff; --sand: #eaeaea;
          --sage: #b3b3b3; --sage-dark: #666666; --clay: #333333;
          --ink: #111111; --muted: #888888;
        `;
      } else if (palette === "CREMA_NOTTE") {
        css += `
          --cream: #1e1b18; --ivory: #2a2522; --sand: #3b3531;
          --sage: #8f8576; --sage-dark: #d4c5b0; --clay: #d6996d;
          --ink: #fcf6ef; --muted: #a69c8e;
          --line: rgba(255,255,255,0.1); --line-strong: rgba(255,255,255,0.25);
        `;
      }

      // 2. Motore Tipografico
      const typo = clean(cfg.tema_tipografico) || "LUSSO_SERIF";
      if (typo === "MODERNO") {
        fontsUrl = "https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap";
        css += `
          --display: "Plus Jakarta Sans", system-ui, sans-serif;
          --body: "Plus Jakarta Sans", system-ui, sans-serif;
        `;
      } else if (typo === "EDITORIALE") {
        fontsUrl = "https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:wght@400;500&display=swap";
        css += `
          --display: "Playfair Display", Georgia, serif;
          --body: "Lora", Georgia, serif;
        `;
      } else {
        fontsUrl = "https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap";
        css += `
          --display: "Cormorant Garamond", Georgia, serif;
          --body: "Inter", system-ui, sans-serif;
        `;
      }

      css += "}";
      styleTag.innerHTML = `@import url('${fontsUrl}');\n${css}`;
    }

    // Controllo Scadenza Date
    function isExpired(dateString) {
      if (!dateString) return false;
      const expiry = new Date(dateString);
      if (isNaN(expiry)) return false;
      // Scade alla mezzanotte del giorno inserito
      expiry.setHours(23, 59, 59, 999);
      return new Date() > expiry;
    }

        const urlKey = prefix === "foto" ? `foto_${n}_url` : `foto_estesa_${n}_url`;

          src: cfg[urlKey],
          placeholder: cfg[placeholderKey],
          caption: cfg[`foto_${n}_didascalia`] || `Foto ${n}`

      const section = $("#galleria");
      if (!isOn(cfg.galleria_attiva)) { section.hidden = true; return; }
      const main = collectGallery(cfg, "foto", 9);

          <div class="gallery-grid" data-reveal>

              ${clean(item.caption) ? `<figcaption>${esc(item.caption)}</figcaption>` : ""}
            </figure>`).join("")}
          </div>
          ${lightboxItems.length ? `<div class="gallery-actions"><button class="pill" type="button" id="gallery-open">${esc(cfg.galleria_estesa_testo_bottone || "Vedi tutte le foto")}</button></div>` : ""}
        </div>`;
      hydrateImages(section);
      $$("[data-gallery-index]", section).forEach((item) => {

    function renderLightbox() {
      $("#lightbox").innerHTML = `
        <div class="lightbox-top">
          <span id="lightbox-count"></span>
          <button class="pill" type="button" id="lightbox-close">Chiudi</button>
        </div>
        <div class="lightbox-frame"><img id="lightbox-img" alt=""></div>
        <div class="lightbox-bottom">
          <button class="round" type="button" id="lightbox-prev" aria-label="Foto precedente">‹</button>
          <button class="round" type="button" id="lightbox-next" aria-label="Foto successiva">›</button>
        </div>`;
      $("#lightbox-close").addEventListener("click", closeLightbox);
      $("#lightbox-prev").addEventListener("click", () => moveLightbox(-1));
      $("#lightbox-next").addEventListener("click", () => moveLightbox(1));
    }

    function openLightbox(index) {
      if (!lightboxItems.length) return;
      lightboxIndex = index;
      renderLightboxImage();
      document.body.classList.add("lightbox-open");
      $("#lightbox").classList.add("is-open");
      $("#lightbox").setAttribute("aria-hidden", "false");
    }
    function closeLightbox() {
      document.body.classList.remove("lightbox-open");
      $("#lightbox").classList.remove("is-open");
      $("#lightbox").setAttribute("aria-hidden", "true");
    }
    function moveLightbox(delta) {
      lightboxIndex = (lightboxIndex + delta + lightboxItems.length) % lightboxItems.length;
      renderLightboxImage();
    }
    function renderLightboxImage() {
      const item = lightboxItems[lightboxIndex];
      const img = $("#lightbox-img");
      img.alt = clean(item.caption) || "Foto";
      applyImage(img, item.src, item.placeholder, item.caption || "Foto yoga");
      $("#lightbox-count").textContent = `${lightboxIndex + 1} / ${lightboxItems.length}`;
    }

    function renderContact(cfg) {
      const href = ctaHref(cfg.footer_cta_tipo, cfg.footer_whatsapp || cfg.footer_telefono || cfg.hero_cta_contatto);
      
      // Mappa Dinamica
      const address = clean(cfg.footer_indirizzo);
      const mapLink = isOn(cfg.footer_mappa_attiva) && address 
        ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}` 
        : "";

      const contacts = [
        ["Telefono", cfg.footer_telefono, cfg.footer_telefono ? `tel:${telClean(cfg.footer_telefono)}` : ""],
        ["WhatsApp", cfg.footer_whatsapp, cfg.footer_whatsapp ? `https://wa.me/${telClean(cfg.footer_whatsapp).replace(/^\+/, "")}` : ""],
        ["Email", cfg.footer_email, cfg.footer_email ? `mailto:${cfg.footer_email}` : ""],
        ["Dove", address, mapLink],
        ["Orari", cfg.footer_orari, ""]
      ].filter((item) => clean(item[1]));
      
      $("#contatti").innerHTML = `
        <div class="shell">
          <div data-reveal>
            <div class="eyebrow">Contatti</div>
            <h2 class="contact-title">${esc(cfg.footer_nome || cfg.schema_nome || "Iniziamo")}</h2>
            <div style="margin-top:1.5rem"><a class="pill" href="${esc(href)}"${href.startsWith("http") ? " target=\"_blank\" rel=\"noopener\"" : ""}>${esc(cfg.footer_cta_testo || "Scrivimi")}</a></div>
          </div>
          <div class="contact-grid" data-reveal>
            ${contacts.map(([label, value, link]) => `<div class="contact-item"><span>${esc(label)}</span>${link ? `<a href="${esc(link)}" ${label==='Dove' ? 'target="_blank" rel="noopener" title="Apri in Google Maps"' : ''}>${esc(value)} ${label==='Dove' ? ' ↗' : ''}</a>` : `<strong>${esc(value)}</strong>`}</div>`).join("")}
          </div>
        </div>`;
    }

    function renderFooter(cfg) {
      const credits = isOn(cfg.crediti_ompage_footer) ? `Sito realizzato da <a href="https://ompage.it" target="_blank" rel="noopener">Ompage</a>` : "";
      $("#footer").innerHTML = `
        <span>${esc(cfg.footer_nome || cfg.schema_nome || cfg.navbar_logo_testo || "Yoga")} © ${new Date().getFullYear()}</span>
        <span>${credits}</span>`;
    }

    function renderPopup(cfg) {
      if (!isOn(cfg.popup_attivo) || !clean(cfg.popup_testo) || isExpired(cfg.popup_scadenza)) return;
      const popup = $("#popup");
      const href = ctaHref(cfg.popup_cta_tipo, cfg.popup_cta_contatto || cfg.footer_whatsapp);
      popup.innerHTML = `<div class="popup-card"><p>${esc(cfg.popup_testo)}</p><div class="popup-actions"><a class="pill dark" href="${esc(href)}"${href.startsWith("http") ? " target=\"_blank\" rel=\"noopener\"" : ""}>${esc(cfg.popup_cta_testo || "Scopri di più")}</a><button class="pill" type="button" id="popup-close">Chiudi</button></div></div>`;
      $("#popup-close").addEventListener("click", closePopup);
      setTimeout(() => {
        document.body.classList.add("popup-open");
        popup.classList.add("is-visible");
        popup.setAttribute("aria-hidden", "false");
      }, 900);
    }
    function closePopup() {
      document.body.classList.remove("popup-open");
      $("#popup").classList.remove("is-visible");
      $("#popup").setAttribute("aria-hidden", "true");
    }

    function initReveal() {
      const items = $$("[data-reveal]");
      if (!("IntersectionObserver" in window)) {
        items.forEach((item) => item.classList.add("is-visible"));
        return;
      }
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-visible");
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.12 });
      items.forEach((item) => observer.observe(item));
    }

    function initChrome() {
      $("#menu-open").addEventListener("click", openMenu);
      $("#menu-close").addEventListener("click", closeMenu);
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") { closeMenu(); closeLightbox(); closePopup(); }
        if ($("#lightbox").classList.contains("is-open") && event.key === "ArrowLeft") moveLightbox(-1);
        if ($("#lightbox").classList.contains("is-open") && event.key === "ArrowRight") moveLightbox(1);
      });
      const nav = $("#site-nav");
      const onScroll = () => nav.classList.toggle("is-scrolled", window.scrollY > 20);
      onScroll();
      window.addEventListener("scroll", onScroll, { passive: true });
    }

    function showLoadError(error) {
      const box = $("#load-error");
      box.textContent = "Non riesco a leggere config.json. Sto mostrando contenuti di sicurezza. Se apri il file da desktop, usa un piccolo server locale o pubblica il sito.";
      box.classList.add("is-visible");
      console.error("[Ompage] config.json:", error);
    }

    async function boot() {
      initChrome();
      const { config: cfg, error } = await loadConfig();
      if (error) showLoadError(error);
      applyTheme(cfg);
      updateMeta(cfg);
      renderPromo(cfg);
      renderNavigation(cfg);
      renderHero(cfg);
      renderAbout(cfg);
      renderServices(cfg);
      renderGallery(cfg);
      renderLightbox();
      renderReviews(cfg);
      renderFaq(cfg);
      renderContact(cfg);
      renderFooter(cfg);
      renderPopup(cfg);
      $("#watermark").classList.toggle("is-visible", isOn(cfg.sito_in_bozza_watermark));
      hydrateImages(document);
      initReveal();
    }

    boot();
  </script>
</body>
</html>
